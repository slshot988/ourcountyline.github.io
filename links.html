    <!-- LINK PAGE SPECIFIC STYLES -->
    <style>
        .link-tree-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .link-tree-header {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .link-tree-logo {
            width: 150px;
            height: auto;
            border-radius: 50%; /* Optional: Creates a circular profile-pic look */
            margin-bottom: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 195, 161, 0.2);
        }

        .link-tree-title {
            font-size: 1.8rem;
            color: #d4c3a1;
            letter-spacing: 2px;
            margin: 0;
        }

        .link-tree-handle {
            font-size: 0.9rem;
            color: #ffcc99;
            opacity: 0.7;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* The Massive Pill Buttons */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 16px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 195, 161, 0.3);
            color: #ffffff;
            text-decoration: none;
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            box-sizing: border-box;
        }

        .link-btn i {
            position: absolute;
            left: 24px;
            font-size: 1.3rem;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffcc99;
            color: #ffcc99;
            transform: translateY(-3px);
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* Specific Button Accents */
        .btn-spotify:hover { border-color: #1DB954; color: #1DB954; }
        .btn-apple:hover { border-color: #FC3C44; color: #FC3C44; }
        .btn-youtube:hover { border-color: #FF0000; color: #FF0000; }
        .btn-store:hover { border-color: #00ff66; color: #00ff66; }

        footer {
            margin-top: 40px;
            border-top: none;
        }
    </style>
</head>
<body class="link-tree-page">

    <div class="link-tree-container">
        
        <!-- HEADER -->
        <div class="link-tree-header">

            <h1 class="link-tree-title">Our County Line</h1>
        <div class="link-tree-handle">@ourcountyline</div>
        </div>

        <!-- THE LINK FUNNEL -->
            <a href="https://open.spotify.com/artist/6mM8kwk7WAaZLb2tF3eEBb" class="link-btn btn-spotify" target="_blank" onclick="fbq('track', 'ViewContent', {content_name: 'LinkTree-Spotify'});">
                <i class="fab fa-spotify"></i> Listen on Spotify
            </a>

            <a href="https://music.apple.com/us/artist/our-county-line/1878001942" class="link-btn btn-apple" target="_blank" onclick="fbq('track', 'ViewContent', {content_name: 'LinkTree-Apple'});">
                <i class="fab fa-apple"></i> Listen on Apple Music
            </a>

            <a href="https://www.youtube.com/@OurCountyLine" class="link-btn btn-youtube" target="_blank" onclick="fbq('track', 'ViewContent', {content_name: 'LinkTree-YouTube'});">
                <i class="fab fa-youtube"></i> Watch on YouTube
            </a>

            <a href="https://shop.ourcountyline.com/" class="link-btn btn-store" target="_blank" onclick="fbq('track', 'ViewContent', {content_name: 'LinkTree-Shop'});">
                <i class="fas fa-shopping-cart"></i> Official Storefront
            </a>

            <a href="index.html" class="link-btn btn-website" onclick="fbq('track', 'ViewContent', {content_name: 'LinkTree-Website'});">
                <img src="images/ocl_logo_transparent.png" alt="OCL Logo" class="btn-custom-icon"> Official Website
            </a>

    </div>

    <footer>
